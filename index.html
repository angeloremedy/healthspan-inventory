<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Healthspan Inventory Monitor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f4f2;--sf:#fff;--sf2:#f0eeec;--sf3:#e8e6e2;
  --bd:#e2dfd9;--bd2:#ccc9c2;
  --tx:#181715;--tx2:#6a6860;--tx3:#9a9890;
  --gr:#0f6e56;--gr-bg:#e0f5ed;--gr-lt:#5dcaa5;
  --am:#7a4a08;--am-bg:#faeeda;--am-lt:#ef9f27;
  --rd:#a02a2a;--rd-bg:#fceaea;--rd-lt:#e24b4a;
  --bl:#155fa0;--bl-bg:#e5f1fb;--bl-lt:#378add;
  --pu:#4e46b2;--pu-bg:#eeedfe;
  --ac:#0f6e56;
  --r:10px;--rs:6px;--rx:4px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#111113;--sf:#18181b;--sf2:#1f1f23;--sf3:#27272b;
  --bd:#2e2e33;--bd2:#45454d;
  --tx:#f0f0ef;--tx2:#9a9a97;--tx3:#656562;
  --gr:#5dcaa5;--gr-bg:#062a1f;--gr-lt:#9fe1cb;
  --am:#ef9f27;--am-bg:#2e1a04;--am-lt:#fac775;
  --rd:#f09595;--rd-bg:#2a0c0c;--rd-lt:#f7c1c1;
  --bl:#85b7eb;--bl-bg:#05192e;--bl-lt:#b5d4f4;
  --pu:#afa9ec;--pu-bg:#16143d;
  --ac:#5dcaa5;
}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;min-height:100vh}
.shell{display:flex;height:100vh;overflow:hidden}
.sb{width:228px;flex-shrink:0;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column;min-width:0}
.brand{padding:18px 16px 14px;border-bottom:1px solid var(--bd)}
.brand-row{display:flex;align-items:center;gap:9px}
.bicon{width:30px;height:30px;background:var(--ac);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bicon svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.bname{font-size:14px;font-weight:700}
.bsub{font-size:11px;color:var(--tx3);margin-top:2px}
.sync-btn{margin:10px 10px 0;padding:8px 10px;border-radius:var(--rs);background:var(--bl-bg);border:1px solid var(--bd);font-size:11px;color:var(--bl);display:flex;align-items:center;gap:6px;cursor:pointer;transition:opacity .15s;user-select:none}
.sync-btn:hover{opacity:.8}
.sync-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.sync-btn.spin svg{animation:spin 1s linear infinite}
.sync-btn.ok{background:var(--gr-bg);color:var(--gr)}
.sync-btn.err{background:var(--rd-bg);color:var(--rd)}
@keyframes spin{to{transform:rotate(360deg)}}
.nav{padding:10px 8px;flex:1;overflow-y:auto}
.nlbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.09em;color:var(--tx3);padding:10px 8px 4px}
.ni{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:var(--rs);cursor:pointer;color:var(--tx2);font-size:12.5px;transition:all .12s;margin-bottom:1px;user-select:none}
.ni:hover{background:var(--sf2);color:var(--tx)}
.ni.active{background:var(--gr-bg);color:var(--gr);font-weight:500}
.ni svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}
.nbadge{margin-left:auto;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;background:var(--rd-bg);color:var(--rd)}
.nbadge.w{background:var(--am-bg);color:var(--am)}
.nbadge.m{background:var(--sf2);color:var(--tx3)}
.sf-foot{padding:10px 14px;border-top:1px solid var(--bd);font-size:10.5px;color:var(--tx3);line-height:1.4}
.topbar{background:var(--sf);border-bottom:1px solid var(--bd);padding:11px 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;gap:12px}
.ptitle{font-size:15px;font-weight:700;letter-spacing:-.01em}
.psub{font-size:11px;color:var(--tx3);margin-top:1px}
.tbr{display:flex;gap:7px;align-items:center;flex-shrink:0}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--rs);border:1px solid var(--bd2);background:var(--sf);color:var(--tx2);font-size:12px;cursor:pointer;transition:all .12s;font-family:inherit;white-space:nowrap}
.btn:hover{background:var(--sf2);color:var(--tx)}
.btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.content{padding:18px 22px;flex:1}
.metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:9px;margin-bottom:18px}
.met{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:13px 15px}
.met-lbl{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--tx3);margin-bottom:7px}
.met-val{font-size:26px;font-weight:800;line-height:1;letter-spacing:-.02em}
.met-sub{font-size:10.5px;color:var(--tx3);margin-top:3px}
.met-bar{height:3px;border-radius:2px;margin-top:10px}
.met.rd .met-val{color:var(--rd)}.met.rd .met-bar{background:var(--rd-lt)}
.met.am .met-val{color:var(--am)}.met.am .met-bar{background:var(--am-lt)}
.met.gr .met-val{color:var(--gr)}.met.gr .met-bar{background:var(--gr-lt)}
.met.bl .met-val{color:var(--bl)}.met.bl .met-bar{background:var(--bl-lt)}
.met.pu .met-val{color:var(--pu)}.met.pu .met-bar{background:#7f77dd}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:18px}
.panel{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:15px}
.phd{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--tx3);margin-bottom:11px;display:flex;align-items:center;gap:5px}
.phd svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.cw{position:relative;width:100%;height:180px}
.hbars{display:flex;flex-direction:column;gap:7px}
.hbrow{display:flex;align-items:center;gap:8px;font-size:11px}
.hblbl{width:92px;flex-shrink:0;color:var(--tx2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer}
.hblbl:hover{color:var(--ac)}
.hbtrack{flex:1;height:7px;background:var(--sf2);border-radius:3px;overflow:hidden}
.hbfill{height:100%;border-radius:3px}
.hbval{width:44px;text-align:right;color:var(--tx3);flex-shrink:0}
.alist{display:flex;flex-direction:column;gap:5px;max-height:195px;overflow-y:auto}
.arow{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:var(--rx);background:var(--sf2);font-size:11.5px;cursor:pointer;transition:background .1s}
.arow:hover{background:var(--sf3)}
.adot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.adot.rd{background:var(--rd-lt)}.adot.am{background:var(--am-lt)}
.aname{flex:1;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ameta{font-size:10px;color:var(--tx3);font-family:ui-monospace,monospace;flex-shrink:0}
.tabs{display:flex;gap:2px;background:var(--sf2);padding:3px;border-radius:var(--rs);width:fit-content;margin-bottom:12px}
.tab{padding:5px 13px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:500;color:var(--tx3);transition:all .12s;user-select:none;white-space:nowrap}
.tab.active{background:var(--sf);color:var(--tx);box-shadow:0 1px 2px rgba(0,0,0,.1)}
.toolbar{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;align-items:center}
.sw{position:relative;flex:1;min-width:170px;max-width:260px}
.sw svg{position:absolute;left:8px;top:50%;transform:translateY(-50%);width:12px;height:12px;stroke:var(--tx3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;pointer-events:none}
input[type=text]{width:100%;padding:6px 9px 6px 27px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--sf);color:var(--tx);font-size:12px;font-family:inherit;outline:none}
input[type=text]:focus{border-color:var(--ac);box-shadow:0 0 0 2px rgba(15,110,86,.12)}
select{padding:6px 10px;border:1px solid var(--bd);border-radius:var(--rs);background:var(--sf);color:var(--tx);font-size:12px;font-family:inherit;cursor:pointer;outline:none}
select:focus{border-color:var(--ac)}
.pill{display:inline-flex;align-items:center;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.02em;white-space:nowrap}
.pgr{background:var(--gr-bg);color:var(--gr)}
.pam{background:var(--am-bg);color:var(--am)}
.prd{background:var(--rd-bg);color:var(--rd)}
.pgy{background:var(--sf2);color:var(--tx3)}
.tcard{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.tscroll{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{padding:8px 11px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--tx3);background:var(--sf2);border-bottom:1px solid var(--bd);white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:var(--tx)}
thead th.sorted{color:var(--ac)}
tbody tr{border-bottom:1px solid var(--bd);transition:background .08s;cursor:pointer}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--sf2)}
td{padding:8px 11px;color:var(--tx);vertical-align:middle;white-space:nowrap}
td.mo{font-family:ui-monospace,'SF Mono',monospace;font-size:10.5px;color:var(--tx2)}
td.mu{color:var(--tx2)}
td.r{text-align:right}
td.stk{text-align:right;font-weight:700;font-variant-numeric:tabular-nums}
.tfooter{padding:9px 14px;border-top:1px solid var(--bd);font-size:11px;color:var(--tx3);display:flex;align-items:center;justify-content:space-between}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.28);z-index:200;display:none}
.overlay.open{display:block}
.drawer{position:fixed;right:0;top:0;height:100vh;width:350px;background:var(--sf);border-left:1px solid var(--bd);z-index:201;transform:translateX(100%);transition:transform .2s cubic-bezier(.4,0,.2,1);overflow-y:auto;box-shadow:-4px 0 24px rgba(0,0,0,.12)}
.drawer.open{transform:translateX(0)}
.dinn{padding:22px 20px}
.dclose{position:absolute;top:14px;right:14px;background:none;border:none;cursor:pointer;color:var(--tx3);padding:5px;border-radius:5px}
.dclose:hover{background:var(--sf2);color:var(--tx)}
.dclose svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;display:block}
.dsku{font-size:10.5px;font-family:monospace;color:var(--tx3);margin-bottom:3px}
.dname{font-size:17px;font-weight:700;margin-bottom:10px;line-height:1.25}
.dstk{font-size:42px;font-weight:800;line-height:1;margin:14px 0 2px;letter-spacing:-.03em}
.dsub{font-size:11px;color:var(--tx3)}
.dvel{margin-top:12px}
.dvhd{display:flex;justify-content:space-between;font-size:11px;color:var(--tx3);margin-bottom:4px}
.dvtrack{height:5px;background:var(--sf2);border-radius:3px;overflow:hidden}
.dvfill{height:100%;border-radius:3px;background:var(--ac)}
.dsec{margin-top:18px}
.dsectitle{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:var(--tx3);margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid var(--bd)}
.drow{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--bd);font-size:12px}
.drow:last-child{border-bottom:none}
.dlbl{color:var(--tx3)}
.dval{font-weight:500;text-align:right;max-width:58%}
.empty{text-align:center;padding:48px 24px;color:var(--tx3);font-size:13px}
@media(max-width:760px){.sb{display:none}.g2{grid-template-columns:1fr}.metrics{grid-template-columns:repeat(2,1fr)}.drawer{width:100vw}}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:10px}
</style>
</head>

function statusOf(s){
  if(s===null) return {l:'N/A',c:'pgy'};
  if(s<0)      return {l:'Negative',c:'prd'};
  if(s===0)    return {l:'Out of stock',c:'prd'};
  if(s<10)     return {l:'Low',c:'pam'};
  return              {l:'In stock',c:'pgr'};
}
function fmtP(v){return v!=null&&v>10?'&#8369;'+v.toLocaleString('en-PH',{minimumFractionDigits:2,maximumFractionDigits:2}):'&mdash;';}
function expSoon(e){
  if(!e||e==='-') return false;
  const parts=e.match(/([0-9]{1,2})[\/\-]([0-9]{4})/);
  if(!parts) return false;
  return (new Date(+parts[2],+parts[1]-1,1)-new Date())/(864e5*30)<6;
}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

/* ── SYNC ── */
async function syncNow(){
  const btn=$('syncBtn'), lbl=$('slbl');
  btn.className='sync-btn spin'; lbl.textContent='Syncing from Google Sheets...';
  try{
    const r = await fetch('/api/sync', {method:'POST', headers:{'Content-Type':'application/json'}, body:'{}'});
    const data = await r.json();
    if(data.error) throw new Error(data.error);
    if(!data.products || !Array.isArray(data.products)) throw new Error('Unexpected response from sync');
    if(data.products.length < 5) throw new Error('Too few products returned — check sheet tab names in edge function');

    DATA = data.products;

    const ts = new Date(data.synced).toLocaleString('en-PH',{timeZone:'Asia/Manila',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    $('sf-foot').innerHTML='<span style="color:var(--gr);font-weight:600">Live</span> &middot; Synced '+ts;
    $('psub').textContent='Healthspan Global, Inc. \u00b7 live from Google Sheets \u00b7 '+DATA.length+' SKUs';
    btn.className='sync-btn ok'; lbl.textContent='Synced '+ts;
    refreshSidebar();
    if(currentView==='dashboard') renderDashboard(); else renderTable();
  } catch(e){
    btn.className='sync-btn err'; lbl.textContent='Sync failed \u2014 click to retry';
    const msg = e.message || 'Unknown error';
    $('sf-foot').textContent='Sync error: '+msg.slice(0,120);
    console.error('Sync error:',e);
    alert('Sync error: '+msg);
  }
}

/* ── VIEWS ── */
function showView(v,el){
  currentView=v; fLine=''; fSearch=''; fTab='all';
  document.querySelectorAll('.ni').forEach(x=>x.classList.remove('active'));
  if(el) el.classList.add('active');
  const T={dashboard:'Dashboard',all:'All SKUs',oos:'Out of stock',low:'Low stock',neg:'Negative stock'};
  $('ptitle').textContent=T[v]||v;
  if(v==='dashboard') renderDashboard(); else renderTable(v);
}
function fltLine(line,el){
  currentView='line'; fLine=line; fSearch=''; fTab='all';
  document.querySelectorAll('.ni').forEach(x=>x.classList.remove('active'));
  if(el) el.classList.add('active');
  $('ptitle').textContent=line;
  renderTable();
}

  const oosComm=oos.filter(p=>p.category==='Commercial').sort((a,b)=>b.received-a.received).slice(0,7);
  $('ooslist').innerHTML=oosComm.length?oosComm.map(p=>
    '<div class="arow" onclick="openDrawer(\''+esc(p.sku)+'\')"><div class="adot rd"></div><div class="aname">'+esc(p.name)+'</div><div class="ameta">'+esc(p.sku)+'</div></div>'
  ).join(''):'<div class="empty">No out-of-stock commercial items</div>';

  $('lowlist').innerHTML=low.length?low.sort((a,b)=>stk(a)-stk(b)).slice(0,7).map(p=>
    '<div class="arow" onclick="openDrawer(\''+esc(p.sku)+'\')"><div class="adot am"></div><div class="aname">'+esc(p.name)+'</div><div class="ameta">'+stk(p)+' left</div></div>'
  ).join(''):'<div class="empty">No low-stock alerts</div>';
}

/* ── TABLE ── */
function renderTable(pre){
  if(pre==='oos') fTab='oos';
  else if(pre==='low') fTab='low';
  else if(pre==='neg') fTab='neg';
  const lines=[...new Set(DATA.map(p=>p.line).filter(Boolean))].sort();
  const cats=[...new Set(DATA.map(p=>p.category).filter(Boolean))].sort();
  const tabHTML=
    '<div class="tabs">'+
    '<div class="tab'+(fTab==='all'?' active':'')+'" onclick="setTab(\'all\')">All</div>'+
    '<div class="tab'+(fTab==='oos'?' active':'')+'" onclick="setTab(\'oos\')">Out of stock</div>'+
    '<div class="tab'+(fTab==='low'?' active':'')+'" onclick="setTab(\'low\')">Low stock</div>'+
    '<div class="tab'+(fTab==='neg'?' active':'')+'" onclick="setTab(\'neg\')">Negative</div>'+
    '</div>';
  const lOpts=lines.map(l=>'<option value="'+esc(l)+'"'+(fLine===l?' selected':'')+'>'+esc(l)+'</option>').join('');
  const cOpts=cats.map(c=>'<option value="'+esc(c)+'"'+(fCat===c?' selected':'')+'>'+esc(c)+'</option>').join('');
  $('content').innerHTML=tabHTML+
    '<div class="toolbar">'+
    '<div class="sw"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>'+
    '<input type="text" id="si" placeholder="Search SKU or product..." value="'+esc(fSearch)+'" oninput="fSearch=this.value;drawRows()"></div>'+
    '<select id="li" onchange="fLine=this.value;drawRows()"><option value="">All product lines</option>'+lOpts+'</select>'+
    '<select id="ci" onchange="fCat=this.value;drawRows()"><option value="">All categories</option>'+cOpts+'</select>'+
    '</div>'+
    '<div class="tcard"><div class="tscroll"><table>'+
    '<thead><tr>'+mkTh('sku','SKU')+mkTh('name','Product name')+mkTh('line','Line')+mkTh('category','Category')+mkTh('bin','Bin')+mkTh('expiry','Expiry')+mkTh('price','Price','r')+mkTh('received','Rcvd','r')+mkTh('sold','Sold','r')+mkTh('stock','Stock','r')+'<th>Status</th></tr></thead>'+
    '<tbody id="tbody"></tbody></table></div>'+
    '<div class="tfooter"><span id="tc"></span><span>Click a row for details</span></div></div>';
  drawRows();
}
function mkTh(col,lbl,align){
  const a=sortCol===col?(sortDir>0?' ↑':' ↓'):'';
  return '<th onclick="toggleSort(\''+col+'\')" class="'+(sortCol===col?'sorted':'')+'"'+(align?' style="text-align:right"':'')+'>'+lbl+a+'</th>';
}
function setTab(t){
  fTab=t;
  document.querySelectorAll('.tab').forEach(el=>{
    const map={all:'All',oos:'Out of stock',low:'Low stock',neg:'Negative'};
    el.classList.toggle('active',el.textContent.trim()===map[t]);
  });
  drawRows();
}
function toggleSort(col){
  if(sortCol===col) sortDir*=-1; else{sortCol=col;sortDir=-1;}
  renderTable();
}
function drawRows(){
  const q=fSearch.toLowerCase();
  let rows=DATA.filter(p=>{
    if(q&&!(p.sku.toLowerCase().includes(q)||p.name.toLowerCase().includes(q))) return false;
    if(fLine&&p.line!==fLine) return false;
    if(fCat&&p.category!==fCat) return false;
    const s=stk(p);
    if(fTab==='oos'&&s!==0) return false;
    if(fTab==='low'&&!(s!==null&&s>0&&s<10)) return false;
    if(fTab==='neg'&&!(s!==null&&s<0)) return false;
    return true;
  });
  rows.sort((a,b)=>{
    let av=a[sortCol],bv=b[sortCol];
    if(av==null)av=''; if(bv==null)bv='';
    if(typeof av==='number'&&typeof bv==='number') return (av-bv)*sortDir;
    return String(av).localeCompare(String(bv))*sortDir;
  });
  const tbody=$('tbody');
  if(!rows.length){
    tbody.innerHTML='<tr><td colspan="11"><div class="empty">No products match these filters</div></td></tr>';
  } else {
    tbody.innerHTML=rows.map(p=>{
      const s=stk(p); const st=statusOf(s);
      const sc=s<0?'color:var(--rd)':s===0?'color:var(--rd)':s!==null&&s<10?'color:var(--am)':'';
      const ew=expSoon(p.expiry)?'color:var(--am);font-weight:600':'';
      return '<tr onclick="openDrawer(\''+esc(p.sku)+'\')">'+
        '<td class="mo">'+esc(p.sku)+'</td>'+
        '<td style="max-width:170px;overflow:hidden;text-overflow:ellipsis" title="'+esc(p.name)+'">'+esc(p.name)+'</td>'+
        '<td class="mu" style="max-width:100px;overflow:hidden;text-overflow:ellipsis">'+esc(p.line||'')+'</td>'+
        '<td class="mu">'+esc(p.category||'')+'</td>'+
        '<td class="mo mu">'+esc(p.bin||'&mdash;')+'</td>'+
        '<td style="font-size:11px;'+ew+'">'+esc(p.expiry||'&mdash;')+'</td>'+
        '<td class="r mu" style="font-size:11px">'+fmtP(p.price)+'</td>'+
        '<td class="r mu">'+(p.received||0).toLocaleString()+'</td>'+
        '<td class="r mu">'+(p.sold||0).toLocaleString()+'</td>'+
        '<td class="stk r" style="'+sc+'">'+(s!==null?s.toLocaleString():'&mdash;')+'</td>'+
        '<td><span class="pill '+st.c+'">'+st.l+'</span></td>'+
        '</tr>';
    }).join('');
  }
  $('tc').textContent=rows.length+' of '+DATA.length+' SKUs';
}

/* ── DRAWER ── */
function openDrawer(sku){
  const p=DATA.find(x=>x.sku===sku); if(!p) return;
  const s=stk(p); const st=statusOf(s);
  const vel=p.received>0?Math.min(100,Math.round(p.sold/p.received*100)):0;
  const sc=s<0?'var(--rd)':s===0?'var(--rd)':s!==null&&s<10?'var(--am)':'var(--gr)';
  $('dbody').innerHTML=
    '<div class="dsku">'+esc(p.sku)+'</div>'+
    '<div class="dname">'+esc(p.name)+'</div>'+
    '<span class="pill '+st.c+'">'+st.l+'</span>'+
    '<div class="dstk" style="color:'+sc+'">'+(s!==null?s.toLocaleString():'&mdash;')+'</div>'+
    '<div class="dsub">units on hand</div>'+
    '<div class="dvel"><div class="dvhd"><span>Sell-through</span><span>'+vel+'%</span></div><div class="dvtrack"><div class="dvfill" style="width:'+vel+'%"></div></div></div>'+
    '<div class="dsec"><div class="dsectitle">Product</div>'+
    '<div class="drow"><span class="dlbl">Line</span><span class="dval">'+esc(p.line||'&mdash;')+'</span></div>'+
    '<div class="drow"><span class="dlbl">Category</span><span class="dval">'+esc(p.category||'&mdash;')+'</span></div>'+
    '<div class="drow"><span class="dlbl">Price (VATex)</span><span class="dval">'+fmtP(p.price)+'</span></div>'+
    '<div class="drow"><span class="dlbl">Inventory value</span><span class="dval">'+(s>0&&p.price?fmtP(s*p.price):'&mdash;')+'</span></div>'+
    '</div>'+
    '<div class="dsec"><div class="dsectitle">Warehouse</div>'+
    '<div class="drow"><span class="dlbl">Bin location</span><span class="dval">'+esc(p.bin||'&mdash;')+'</span></div>'+
    '<div class="drow"><span class="dlbl">Batch</span><span class="dval">'+esc(p.batch||'&mdash;')+'</span></div>'+
    '<div class="drow"><span class="dlbl">Expiry</span><span class="dval" style="'+(expSoon(p.expiry)?'color:var(--am);font-weight:600':'')+'">'+esc(p.expiry||'&mdash;')+'</span></div>'+
    '</div>'+
    '<div class="dsec"><div class="dsectitle">Movement</div>'+
    '<div class="drow"><span class="dlbl">Total received</span><span class="dval">'+(p.received||0).toLocaleString()+' units</span></div>'+
    '<div class="drow"><span class="dlbl">Total sold / issued</span><span class="dval">'+(p.sold||0).toLocaleString()+' units</span></div>'+
    '<div class="drow"><span class="dlbl">Current stock</span><span class="dval" style="color:'+sc+'">'+(s!==null?s.toLocaleString()+' units':'&mdash;')+'</span></div>'+
    '</div>';
  $('overlay').classList.add('open');
  $('drawer').classList.add('open');
}
function closeDrawer(){$('overlay').classList.remove('open');$('drawer').classList.remove('open');}

/* ── EXPORT ── */
function exportCSV(){
  const h=['SKU','Name','Line','Category','Bin','Batch','Expiry','Price','Received','Sold','Stock','Status'];
  const rows=DATA.map(p=>{const s=stk(p);return[p.sku,p.name,p.line,p.category,p.bin,p.batch,p.expiry,p.price??'',p.received,p.sold,s??'',statusOf(s).l].map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(',');});
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent([h.join(','),...rows].join('\n'));
  a.download='healthspan_inventory_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

/* ── INIT ── */
refreshSidebar();
renderDashboard();
$('sf-foot').innerHTML='Cached data &middot; <a href="#" onclick="syncNow();return false" style="color:var(--ac)">sync now</a>';
setTimeout(syncNow, 600);

</script>
</body>
